<!DOCTYPE html> 
<html ng-app="customersApp"> 
<head> 
<meta charset="utf-8"> 
<title>CustomersList</title> 
<script src="http://cdnjs.cloudflare.com/ajax/libs/angular.js/1.2.1/angular.min.js"></script>
<script>
(function(angular) {
'use strict';
var customersApp= angular.module('customersApp', []);
customersApp.controller('CustomerCtrl', function ($scope, $http){
$scope.customers = [];
_refreshCustomer();
function _refreshCustomer() {
var method = "";
var url = "";
method = "GET";
url = "Customers.php";
$http({
method : method,
url : url,
headers : {
'Content-Type' : 'application/json'
}
}).then( _success, _error );
};
function _success(response) {
$scope.customers = response.data;
   }
function _error(response) {
console.log(response.statusText);
alert(response.statusText);
}
});
})(window.angular);
</script>
</head>
<body>
<div ng-app="customersApp" ng-controller="CustomerCtrl">
<ul>
<li ng-repeat="customer in customers">
{{customer.customername}}
{{customer.city}}
{{customer.state}}
{{customer.zipcode}}
{{customer.contactno}}
{{customer.streetaddress}}
{{customer.country}}
<td><a href="editCustomer.html?id={{customer.customerid}}">Edit</a> | <a href="deleteCustomer.html?id={{customer.customerid}}">Delete</a>
</li>
</ul>
</div>
</body>
</html>
